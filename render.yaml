services:
  - type: web
    name: hermes-agent
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "8080"
      - key: DEFAULT_MODEL
        value: deepseek-v4-flash-free
      - key: DEFAULT_PROVIDER
        value: opencode
      - key: OPENCODE_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: NUMERAI_API_KEY
        sync: false
      - key: NUMERAI_MODEL_ID
        sync: false
      - key: NUMERAI_USERNAME
        sync: false
      - key: KAGGLE_USERNAME
        sync: false
      - key: KAGGLE_KEY
        sync: false
      - key: N8N_URL
        sync: false
      - key: N8N_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NATS_URL
        sync: false
      - key: NATS_CREDS
        sync: false
      - key: CADDY_URL
        sync: false
      - key: CADDY_API_KEY
        sync: false
      - key: GRAFANA_URL
        sync: false
      - key: GRAFANA_API_KEY
        sync: false
      - key: HERMES_PASSWORD
        sync: false
      - key: HERMES_DASHBOARD_USER
        value: admin
