model:
  default: deepseek-v4-flash-free
  provider: opencode
  base_url: https://opencode.ai/zen/v1
providers:
  opencode:
    api: https://opencode.ai/zen/v1
    default_model: deepseek-v4-flash-free
    models:
    - deepseek-v4-flash-free
    - deepseek-v4-fast-free
    - deepseek-v4-pro
    name: OpenCode
    key_env: OPENCODE_API_KEY
  mistral:
    api: https://api.mistral.ai/v1
    default_model: pixtral-12b
    models:
    - pixtral-12b
    - mistral-large-latest
    - mistral-small-latest
    name: Mistral
    key_env: MISTRAL_API_KEY
toolsets:
- hermes-cli
- web
- memory
- todo
- delegation
- cronjob
- code_execution
- computer_use
- session_search
- clarify
- file
- terminal
- browser
- vision
- skills
agent:
  max_turns: 150
  gateway_timeout: 1800
  tool_use_enforcement: auto
  task_completion_guidance: true
  environment_probe: true
  image_input_mode: auto
terminal:
  backend: local
  timeout: 180
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
web:
  backend: ddgs
browser:
  inactivity_timeout: 120
  engine: auto
skills:
  external_dirs:
  - /root/pi/skills
display:
  personality: default
  streaming: true
  skin: default
  interface: web
telegram:
  reactions: false
  channel_prompts: {}
  allowed_chats: ''
platform_toolsets:
  telegram:
  - browser
  - clarify
  - code_execution
  - computer_use
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
auxiliary:
  vision:
    provider: mistral
    model: pixtral-12b
dashboard:
  theme: default
memory:
  memory_enabled: true
  provider: qdrant
  qdrant:
    url_env: QDRANT_URL
    api_key_env: QDRANT_API_KEY
    collection: hermes_memory

mcp:
  servers:
    supabase:
      type: http
      url_env: SUPABASE_URL
      headers:
        Authorization: "Bearer ${SUPABASE_KEY}"
        apikey: "${SUPABASE_KEY}"
    n8n:
      type: http
      url_env: N8N_URL
      headers:
        Authorization: "Bearer ${N8N_API_KEY}"

supabase:
  url_env: SUPABASE_URL
  key_env: SUPABASE_KEY

redis:
  url_env: REDIS_URL

nats:
  url_env: NATS_URL
  creds_env: NATS_CREDS

caddy:
  url_env: CADDY_URL
  api_key_env: CADDY_API_KEY

grafana:
  url_env: GRAFANA_URL
  api_key_env: GRAFANA_API_KEY

security:
  redact_secrets: true
logging:
  level: INFO
